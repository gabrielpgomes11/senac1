<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width">
		<title>Aprendendo JavaScript</title>

	</head>
	<body>
        <h1>Bem vindo ao JavaScript</h1>
        <script>
            let hora = "10";
            if (hora < 12) {
                alert("Bom dia!");
            } else if (hora < 18) {
                alert("Boa tarde!");
            } else {
                alert("Boa noite!");
            }

            for (let i = 0; i < 5; i++) {
                alert("Iteração " + i);
            }
        </script>
    </body>
</html>
