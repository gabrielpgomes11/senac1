            function pulalinha() {
                document.write("<br>");
            }
            
            function mostra(frase) {
                document.write(frase);
                pulalinha();
            }
            
            function calcularIMC(peso, altura) {
                return Math.round(peso / (altura * altura));
            }


            var nome = prompt("Qual é o seu nome?");
            var altura = parseFloat(prompt("Qual é a sua altura em metros?"));
            var peso = parseFloat(prompt("Qual é o seu peso em kg?"));
            var imc = calcularIMC(peso, altura);
            mostra("Olá, " + nome + "! Seu IMC é: " + imc);

            if (imc < 18.5) {
                mostra("Você está abaixo do peso.");
            } else if (imc < 25) {
                mostra("Você está com peso normal.");
            } else if (imc < 30) {
                mostra("Você está com sobrepeso.");
            } else {
                mostra("Você está com obesidade.");
            }
