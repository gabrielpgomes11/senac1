<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css?family=Montserrat&display=swap" rel="stylesheet">
    <title>Trabalho Inglês</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --text-color: #1f2937;
            --bg-color: #f3f4f67a;
            --card-bg: #ffffff;
        }

        {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 40px;
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 900px;
        }

        @media (min-width: 768px) {
            .main-content {
                grid-template-columns: 1fr 1fr;
                align-items: center;
            }
        }

        .headline h1 {
            font-size: 2.5rem;
            color: #111827;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .headline p {
            font-size: 1.1rem;
            color: #4b5563;
            margin-bottom: 20px;
        }

        .features-list {
            list-style: none;
        }

        .features-list li {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            font-weight: 500;
        }

        .features-list li::before {
            content: "✓";
            color: var(--primary-color);
            font-weight: bold;
            margin-right: 10px;
            font-size: 1.2rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #374151;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-top: 5px;
        }

        .checkbox-group input {
            margin-top: 4px;
        }

        .checkbox-group label {
            font-size: 0.85rem;
            font-weight: normal;
            color: #4b5563;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
            color: #6b7280;
            border-top: 1px solid #e5e7eb;
        }
        .video {
            width: 560px;
            margin: 2em auto;
        }
    </style>
</head>
<body>
    <section>
        <div class="container">
            <p> Teste </p>
        </div>
    </section>
